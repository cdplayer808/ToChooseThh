    function computeBestCollection(answers) {
        let userScores = Object.fromEntries(DIMS.map(d=>[d,0]));
        for(let i=0;i<answers.length;i++) {
            let opt = answers[i];
            if(opt===-1) continue;
            let bonus = bonusMap[i][opt];
            if(bonus) for(let [dim,val] of Object.entries(bonus)) userScores[dim] += val;
        }
        let best=null, bestScore=-1;
        for(let [name,weights] of Object.entries(COLLECTION_WEIGHTS)) {
            let total=0, sumW=0;
            for(let [dim,w] of Object.entries(weights)) {
                total += (userScores[dim]||0) * w;
                sumW += w;
            }
            let score = sumW ? total/sumW : 0;
            if(score>bestScore) { bestScore=score; best=name; }
        }
        return best;
    }

    let state = { screen: 'start', answers: new Array(19).fill(-1), curQuestion: 0 };

    function showGreatToast() {

        if(existing) existing.remove();

    async function shareResultScreenshot(element, resultName) {
        if (!element) return;
        try {
            const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#fefaf2', logging: false });
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const file = new File([blob], `${resultName}.png`, { type: 'image/png' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ title: '坠了没·处方笺', text: `今天${resultName}很适合你！`, files: [file] });
                showGreatToast();
            } else {
                downloadBlob(blob, `${resultName}.png`);
                showGreatToast();
            }
        } catch (err) {
            if (err.name !== 'AbortError') {
                // 分享失败时强制下载
                try {
                    const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#fefaf2', logging: false });
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    downloadBlob(blob, `${resultName}.png`);
                    showGreatToast();
                } catch (e) { alert('保存失败，请手动截图'); }
            }
        }
    }

    function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

                    state.curQuestion++;
                    render();
                } else {
                    const finalName = computeBestCollection(state.answers);

        else if(state.screen === 'result') renderResult();

    function checkSharedReturn() {
        const params = new URLSearchParams(window.location.search);
        if(params.has('result')) {

                window.history.replaceState({}, document.title, cleanUrl);

    }

    render();
